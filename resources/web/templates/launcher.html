{% extends "layout.html" %}

{% block title %}Kawari Launcher{% endblock %}

{% block body %}
<main class="p-3">
<h1>Kawari</h1>

<div class="alert alert-primary" role="alert" id="alert" style="display: none">
    <p id="statusMessage"></p>
</div>

<form id="login" style="max-width: 300px;" class="mt-3 mb-3">
    <label for="sqexid" class="form-label">Username</label><br>
    <input type='text' id='sqexid' name='sqexid' class="form-control"/><br>
    <label for="password" class="form-label">Password</label><br>
    <input id='password' name='password' class="form-control" type="password"/><br>
    <input type="hidden" id="_STORED_" name="_STORED_" value="34657" />
    <button type='submit'  class="btn btn-primary">Login</button>
</form>

<input type="button" class="btn btn-primary btn-lg mt-3 mb-3" id="play" value="Play" onclick="sendApp('startPlay');" style="display: none"/>

<div class="btn-group mb-3" role="group">
    <input type="button" class="btn btn-secondary" value="System Info" onclick="sendApp('systemInfo');" />
    <input type="button" class="btn btn-secondary" value="Config Tool" onclick="sendApp('configTransport');" />
</div>

<div class="btn-group mb-3" role="group">
    <input type="button" class="btn btn-outline-secondary" value="Accept EULA" onclick="sendApp('eulaOk');" />
    <input type="button" class="btn btn-outline-secondary" value="Accept Ex EULAs" onclick="sendApp('eulaExOk');" />
</div>

<p><small>This is not an official login page. It will <i>not</i> accept your official account's credentials, please do not enter them here!</small></p>

</main>

<script type="text/javascript">
    let debug_logging = false;

    function debug(text) {
        if (debug_logging) {
            confirm(text);
        }
    }

    let req;
    function readystatechange(event) {
        if (req.readyState == 4) {
            debug("readystatechange(" + req.response + ")")

            // This login endpoint sends a "window.external.user" which we need to evaludate.
            eval(req.response);
        }
    }

    function error(event) {
        sendApp('login=auth,ng,err,' + req.statusText);
    }

    function login() {
        let sqexid = document.getElementById('sqexid').value;
        let password = document.getElementById('password').value;
        let otppw = "";
        let stored = document.getElementById('_STORED_').value;

        req = new XMLHttpRequest();
        req.addEventListener("readystatechange", readystatechange);
        req.addEventListener("error", error);
        {% autoescape false %}
        req.open("POST", "{{ login_server }}/oauth/ffxivarr/login/login.send");
        {% endautoescape %}
        req.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
        req.send("sqexid=" + sqexid + "&password=" + password + "&otppw=" + otppw + "&_STORED_=" + stored);
    }

    function sendAlert(text) {
        document.getElementById('statusMessage').innerText = text;
        document.getElementById('alert').style.display = "block";
    }

    function sendApp(text) {
        if (debug_logging) {
            debug("window.external.user(" + text + ")");
        }
        window.external.user(text);
    }

    function sendReceivedID(id) {
        sendApp('received=' + id);
    }

    function fromAppConfig(thing) {
        debug("fromAppConfig(" + JSON.stringify(thing) + ")")
    }

    function fromAppWarn(thing) {
        debug("fromAppWarn(" + JSON.stringify(thing) + ")")

        document.getElementById('statusMessage').innerText += "warn: " + JSON.stringify(thing);
    }

    function fromAppStartVersionCheck(thing) {
        debug("fromAppStartVersionCheck(" + JSON.stringify(thing) + ")")

        sendAlert(thing.versionChecking);

        // the official launcher does some preparation stuff here, and when it's finished it tells it the ID it just recieved
        sendReceivedID(thing.ID);
    }

    function fromAppDP(thing) {
        debug("fromAppDP(" + JSON.stringify(thing) + ")")
    }

    function fromAppDisplaySettings(thing) {
        debug("fromAppDisplaySettings(" + JSON.stringify(thing) + ")")

        //sendApp('requestResumeInfo');
    }

    function fromAppResumeInfo(thing) {
        debug("fromAppResumeInfo(" + JSON.stringify(thing) + ")")

        // 3 means "ready to play"
        if (thing.state == 3) {
            document.getElementById("login").style.display = "none";
            document.getElementById("play").style.display = "block";
        }

        // acknowledge
        if (thing.state === 6) {
            sendReceivedID(thing.ID);
        }
    }

    function fromAppExAgree(thing) {
        debug("fromAppExAgree(" + JSON.stringify(thing) + ")")

        sendAlert("You need to accept the following Ex EULAs: " + thing.notAgreedExEulas);
    }

    function fromAppStartDownload(thing) {
        debug("fromAppStartDownload(" + JSON.stringify(thing) + ")")
    }

    function fromAppDownloadProgress(thing) {
        debug("fromAppDownloadProgress(" + JSON.stringify(thing) + ")")
    }

    function fromAppInstallProgress(thing) {
        debug("fromAppInstallProgress(" + JSON.stringify(thing) + ")")
    }

    function fromAppStartInstall(thing) {
        debug("fromAppStartInstall(" + JSON.stringify(thing) + ")")
    }

    function fromAppWaitPlay(thing) {
        debug("fromAppWaitPlay(" + JSON.stringify(thing) + ")");

        // the official launcher does some preparation stuff here, and when it's finished it tells it the ID it just recieved
        sendReceivedID(thing.ID);

        document.getElementById("login").style.display = "none";
        document.getElementById("play").style.display = "block";
    }

    function fromAppServiceAgreement(thing) {
        debug("fromAppServiceAgreement(" + JSON.stringify(thing) + ")")
    }

    function fromAppDialog(thing) {
        debug("fromAppDialog(" + JSON.stringify(thing) + ")")
    }

    function fromAppGameStatus(thing) {
        debug("fromAppGameStatus(" + JSON.stringify(thing) + ")")

        sendApp('requestDisplaySettings');
    }

    function fromAppEtmAdd(thing) {
        debug("fromAppEtmAdd(" + JSON.stringify(thing) + ")")
    }

    function fromAppEtmAdd(thing) {
        debug("fromAppEtmAdd(" + JSON.stringify(thing) + ")")
    }

    function fromAppDialogClose(thing) {
        debug("fromAppDialogClose(" + JSON.stringify(thing) + ")")
    }

    function fromAppOtpManv(thing) {
        debug("fromAppOtpManv(" + JSON.stringify(thing) + ")")
    }

    function fromAppSoftkey(thing) {
        debug("fromAppSoftkey(" + JSON.stringify(thing) + ")")
    }

    function fromAppSvcRmd(thing) {
        debug("fromAppSvcRmd(" + JSON.stringify(thing) + ")")
    }

    // this is what the retail launcher does
    sendApp('permissionFromApp=1');
    sendApp('requestDP');
    sendApp('requestConfig');
    sendApp('requestGameStatus');

    // setup form submission
    const form = document.getElementById("login");
    form.addEventListener("submit", function (event) {
        // ie11 is amazing
        if (event.preventDefault) {
            event.preventDefault();
        } else {
            event.returnValue = false;
        }
        login();
    });
</script>
{% endblock %}
