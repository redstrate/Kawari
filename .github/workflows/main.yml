name: Main

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-webassembly:
    name: "Build (WebAssembly)"
    runs-on: ubuntu-latest
    # Skip running on PR events that come from the same repository, it will just duplicate the branch action
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
    - uses: actions/checkout@v6
    - name: Add WebAssembly Target
      run: |
        rustup target add wasm32-unknown-unknown
    - uses: actions/cache@v5
      id: cache-deps
      with:
        path: |
          ~/.cargo
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: Build
      run: cargo build --package kawari --release --verbose --target=wasm32-unknown-unknown --lib --no-default-features

  build:
    name: "Build"
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        target: [x86_64-unknown-linux-gnu, x86_64-pc-windows-msvc, aarch64-unknown-linux-gnu]
        exclude:
        - os: windows-latest
          target: x86_64-unknown-linux-gnu
        - os: windows-latest
          target: aarch64-unknown-linux-gnu
        - os: ubuntu-latest
          target: x86_64-pc-windows-msvc
        include:
        - target: x86_64-unknown-linux-gnu
          target_name: x86_64
          os_name: linux
        - target: aarch64-unknown-linux-gnu
          target_name: aarch64
          os_name: linux
        - target: x86_64-pc-windows-msvc
          target_name: x86_64
          os_name: windows

    steps:
    - uses: actions/checkout@v6
    - uses: actions/cache@v5
      id: cache-deps
      with:
        path: |
          ~/.cargo
          target/
        key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        cargo install --git https://github.com/rust-lang/mdBook.git mdbook
    - if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross
    - name: Add Target
      run: |
        rustup target add ${{ matrix.target }}
    - uses: robinraju/release-downloader@v1
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      with:
        repository: 'WorkingRobot/OodleUE'
        fileName: 'clang-x64-release.zip'
        latest: true
        extract: true
    - uses: robinraju/release-downloader@v1
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      with:
        repository: 'WorkingRobot/OodleUE'
        fileName: 'clang-arm64-release.zip'
        latest: true
        extract: true
    - if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir oodle
        cp lib/liboodle-network-shared.so oodle/
    - uses: robinraju/release-downloader@v1
      if: matrix.os == 'windows-latest'
      with:
        repository: 'WorkingRobot/OodleUE'
        fileName: 'clang-cl-x64-release.zip'
        latest: true
        extract: true
    - if: runner.os == 'windows-latest'
      run: |
        mkdir oodle
        cp ar/oodle-network-shared.lib oodle/
    - name: Build
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      run: cargo build --release --verbose --features oodle --target ${{ matrix.target }}
    - name: Run Clippy
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: cargo clippy --features oodle -- -Dwarnings --target ${{ matrix.target }}
    - name: Run Cargo fmt
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: cargo fmt --check
    - name: Run tests
      if: matrix.target != 'aarch64-unknown-linux-gnu'
      run: cargo test --verbose --target ${{ matrix.target }}
    - name: Build documentation
      run: |
        mdbook build --dest-dir=docs-build ./docs
        mv docs docs-1
        mv docs-build docs
    - name: Prepare artifacts
      run: |
        mv target/${{ matrix.target }}/release/* .
        echo "${{ github.sha }}" >> version.txt
    - name: Archive artifacts
      uses: actions/upload-artifact@v5
      with:
        name: kawari-${{ matrix.os_name }}-${{ matrix.target_name }}
        path: |
          LICENSE
          README.md
          kawari-admin*
          kawari-frontier*
          kawari-lobby*
          kawari-login*
          kawari-patch*
          kawari-web*
          kawari-world*
          kawari-launcher*
          kawari-savedatabank*
          kawari-navimesh*
          kawari-datacentertravel*
          kawari-run*
          !*.d
          resources/
          !resources/data/tests
          !resources/data/opcodes.json
          !resources/data/scrambler
          !resources/data/constants.yml
          !resources/data/README.md
          version.txt
          docs/
          !docs/src/
          !docs/book.toml

    - name: Set up SSH key
      if: matrix.target == 'x86_64-unknown-linux-gnu' && github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        printf "Host ryne.moe\nPort 38901\nStrictHostKeyChecking no" >> ~/.ssh/config
        chmod 700 ~/.ssh
        chmod 600 ~/.ssh/id_rsa
        chmod 644 ~/.ssh/config

    - name: Upload API documentation
      if: matrix.target == 'x86_64-unknown-linux-gnu' && github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
      run: |
        cargo doc --release --no-deps --lib
        rsync -e "ssh -p 38901 -o StrictHostKeyChecking=no" --recursive target/doc/ deploy@ryne.moe:/srv/http/kawari-api-docs

  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        printf "Host ryne.moe\nPort 38901\nStrictHostKeyChecking no" >> ~/.ssh/config
        chmod 700 ~/.ssh
        chmod 600 ~/.ssh/id_rsa
        chmod 644 ~/.ssh/config
    - name: Upload artifacts
      run: |
        pushd kawari-linux-x86_64
        zip -r ../kawari-linux-x86_64.zip *
        popd

        pushd kawari-linux-aarch64
        zip -r ../kawari-linux-aarch64.zip *
        popd

        pushd kawari-windows-x86_64
        zip -r ../kawari-windows-x86_64.zip *
        popd

        rsync --recursive "kawari-linux-x86_64.zip" deploy@ryne.moe:/srv/http/astra-distrib/kawari/
        rsync --recursive "kawari-linux-aarch64.zip" deploy@ryne.moe:/srv/http/astra-distrib/kawari/
        rsync --recursive "kawari-windows-x86_64.zip" deploy@ryne.moe:/srv/http/astra-distrib/kawari/
        unzip "kawari-linux-x86_64.zip"
        rsync --recursive --delete docs/ deploy@ryne.moe:/srv/http/kawari-docs

